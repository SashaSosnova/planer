name: Android APK release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Write env for Vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_DEEPSEEK_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}
        run: |
          printf '%s\n' \
            "VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}" \
            "VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}" \
            "VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}" \
            "VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}" \
            "VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}" \
            "VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}" \
            "VITE_DEEPSEEK_API_KEY=${VITE_DEEPSEEK_API_KEY}" \
            > .env

      - name: Build web app
        run: npm run build

      - name: Cap sync Android
        run: npx cap sync android

      - name: Ensure release keystore exists
        run: |
          if [ ! -f android/planer.keystore ]; then
            echo "Committed keystore missing — refusing to invent a new one"
            exit 1
          fi
          keytool -list -keystore android/planer.keystore -storepass planer2026 -storetype PKCS12

      - name: Assemble signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify and save APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/planer.apk
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose --print-certs release/planer.apk
          BADGING=$("$ANDROID_SDK_ROOT/build-tools/36.0.0/aapt" dump badging release/planer.apk)
          echo "$BADGING" | head -n 20
          if echo "$BADGING" | grep -q "testOnly='true'"; then
            echo "ERROR: APK is testOnly — cannot sideload from Files"
            exit 1
          fi
          ls -lh release/

      - uses: actions/upload-artifact@v4
        with:
          name: planer-apk
          path: release/planer.apk
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag || true
          gh release create apk-latest \
            release/planer.apk \
            --title "Planer 1.0.0" \
            --notes "$(cat <<'EOF'
          **Planer v1.0.0** — APK для установки с файла.

          Package id: `com.sosnova.planer`.

          Как поставить:
          1. Автоблокировка → выкл. (если мешает).
          2. Мои файлы → Установка неизвестных приложений → разрешить.
          3. Скачай **planer.apk** и открой из Downloads.

          Обновления с той же ссылки ставятся поверх.
          EOF
          )" \
            --latest
